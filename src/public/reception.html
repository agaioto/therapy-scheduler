<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Recepção</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="card card-wide">
      <h1>Painel de Recepção</h1>
      <form id="date-form">
        <label>
          Data
          <input type="date" id="date" />
        </label>
      </form>
      <div id="reception-grid" class="reception-grid"></div>

      <hr class="section-divider" />

      <section id="range-section">
        <h2>Agendamentos por período</h2>
        <form id="range-form">
          <label>
            De
            <input type="date" id="range-from" />
          </label>
          <label>
            Até
            <input type="date" id="range-to" />
          </label>
          <button type="submit" class="button">Buscar período</button>
        </form>
        <p class="message" id="range-message"></p>
        <div id="range-result"></div>
      </section>

      <p class="message" id="message"></p>
      <a href="/" class="button secondary">Voltar</a>
    </main>
    <script src="/static/reception.js"></script>
  </body>
</html>
